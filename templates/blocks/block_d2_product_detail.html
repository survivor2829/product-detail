<!--
  Block D2 — 白底大图+文字屏（product_detail）
  用途：白色背景 + 大标题 + 副标题 + 产品细节大图 + 底部标语
  宽度：750px

  需要传入的变量：
  - title_line1: 标题第一行（如"操作简单易上手"）
  - title_line2: 标题第二行（如"老年人也能轻松驾驭"）
  - subtitle: 副标题（如"面板清晰，标识易懂，节约培训成本"）
  - detail_image: 产品细节图路径（如方向盘、操作面板照片）
  - bottom_text: 底部标语（如"匠心打造，精工品质"，可选留空）
-->
{% if title_line1 or detail_image %}<div style="width:750px; font-family:'PingFang SC','Noto Sans SC','Microsoft YaHei','Helvetica Neue',sans-serif; background:#fff; overflow:hidden;">

  <!-- 标题区 -->
  <div style="padding:50px 36px 0;">
    <div style="font-size:52px; font-weight:900; color:#1a1a1a; line-height:1.3;">
      {{ title_line1 }}
    </div>
    <div style="font-size:52px; font-weight:900; color:#1a1a1a; line-height:1.3;">
      {{ title_line2 }}
    </div>

    <!-- 副标题 + 红色箭头 -->
    <div style="display:flex; align-items:center; gap:12px; margin-top:24px;">
      <div style="display:flex; gap:3px; flex-shrink:0;">
        <span style="display:inline-block; width:0; height:0; border-top:8px solid transparent; border-bottom:8px solid transparent; border-left:12px solid var(--theme-primary, #E8231A);"></span>
        <span style="display:inline-block; width:0; height:0; border-top:8px solid transparent; border-bottom:8px solid transparent; border-left:12px solid var(--theme-primary, #E8231A);"></span>
        <span style="display:inline-block; width:0; height:0; border-top:8px solid transparent; border-bottom:8px solid transparent; border-left:12px solid var(--theme-primary, #E8231A);"></span>
      </div>
      <div style="font-size:24px; color:#555; line-height:1.5;">{{ subtitle }}</div>
    </div>
  </div>

  <!-- 产品细节大图 -->
  <div style="padding:30px 36px 0; display:flex; justify-content:center;">
    <img src="{{ detail_image }}" style="max-width:100%; object-fit:contain;" alt="">
  </div>

  <!-- 底部标语（可选） -->
  {% if bottom_text %}
  <div style="background:var(--theme-primary, #E8231A); padding:24px 36px; text-align:center;">
    <div style="font-size:28px; font-weight:700; color:#fff; letter-spacing:4px;">{{ bottom_text }}</div>
  </div>
  {% endif %}

</div>{% endif %}
