<!--
  block_r_package_list — 包装清单/配件清单
  宽度：750px

  变量：
  - section_title: 标题（如"包装清单"）
  - section_subtitle: 副标题（可空）
  - package_items: 物品列表，每项：{"name":"主刷","qty":"1","note":"可选备注"}
  - package_note: 底部说明（可空）
-->

{% if package_items %}<div style="width:750px; box-sizing:border-box; font-family:'PingFang SC','Noto Sans SC','Microsoft YaHei','Helvetica Neue',sans-serif; background:#FFFFFF; color:#101828; padding:44px 40px 46px 40px;">
  <div style="font-size:28px; font-weight:900; line-height:1.2;">{{ section_title }}</div>
  {% if section_subtitle %}
  <div style="margin-top:10px; font-size:14px; color:#475467; line-height:1.6;">{{ section_subtitle }}</div>
  {% endif %}
  <div style="margin-top:14px; height:2px; background:linear-gradient(90deg, var(--theme-primary, #E8231A) 0%, rgba(232,35,26,0.15) 70%, rgba(232,35,26,0.0) 100%);"></div>

  <div style="margin-top:18px; border-radius:18px; overflow:hidden; border:1px solid #EAECF0;">
    <div style="display:flex; padding:12px 16px; background:#F3F4F6; font-size:13px; font-weight:800; color:#475467;">
      <div style="flex:1;">物品名称</div>
      <div style="flex:0 0 60px; text-align:center;">数量</div>
      <div style="flex:0 0 160px; text-align:right;">备注</div>
    </div>
    {% for item in package_items %}
    <div style="display:flex; align-items:center; padding:14px 16px; background:{% if loop.index0 % 2 == 0 %}#FFFFFF{% else %}#F9FAFB{% endif %}; border-top:1px solid #EAECF0;">
      <div style="flex:1; font-size:14px; font-weight:700; color:#101828;">{{ item.name }}</div>
      <div style="flex:0 0 60px; text-align:center; font-size:14px; font-weight:800; color:var(--theme-primary, #E8231A);">{{ item.qty }}</div>
      <div style="flex:0 0 160px; text-align:right; font-size:12px; color:#667085;">{{ item.note|default('') }}</div>
    </div>
    {% endfor %}
  </div>

  {% if package_note %}
  <div style="margin-top:12px; font-size:12px; color:#98A2B3; line-height:1.6;">{{ package_note }}</div>
  {% endif %}
</div>{% endif %}
