<!--
  Block C3 — 升级对比型（vs_upgrade）
  用途：升级前vs升级后，上面图片对比，下面文字说明
  宽度：750px

  需要传入的变量：
  - title_before: 左侧标题（如"升级前"）
  - title_after: 右侧标题（如"升级后"）
  - comparisons: 对比项列表，每项格式：
      {
        "before_image": "升级前图片路径",
        "after_image": "升级后图片路径",
        "before_title": "升级前小标题（如"单前轮"）",
        "after_title": "升级后小标题（如"双前轮"）",
        "before_desc": "升级前描述（如"转向不平稳易打滑"）",
        "after_desc": "升级后描述（如"转向平稳不打滑"）"
      }
-->
{% if comparisons %}<div style="width:750px; font-family:'PingFang SC','Noto Sans SC','Microsoft YaHei','Helvetica Neue',sans-serif; background:#f5f5f5; overflow:hidden;">

  <!-- 顶部标题：升级前 VS 升级后 -->
  <div style="display:flex; align-items:center; justify-content:center; gap:30px; padding:50px 36px 30px;">
    <div style="font-size:48px; font-weight:900; color:#333;">{{ title_before }}</div>
    <div style="width:64px; height:64px; background:var(--theme-primary, #E8231A); color:#fff; font-size:22px; font-weight:700; border-radius:50%; display:flex; align-items:center; justify-content:center;">VS</div>
    <div style="font-size:48px; font-weight:900; color:var(--theme-primary, #E8231A);">{{ title_after }}</div>
  </div>

  <!-- 对比项 -->
  {% for item in comparisons %}
  <div style="padding:0 30px 30px;">

    <!-- 图片对比：左右并排 -->
    <div style="display:flex; gap:12px;">
      <!-- 升级前图 -->
      <div style="flex:1; border-radius:12px; overflow:hidden; background:#e0e0e0;">
        <img src="{{ item.before_image }}" style="width:100%; height:240px; object-fit:cover;" alt="">
      </div>
      <!-- 升级后图 -->
      <div style="flex:1; border-radius:12px; overflow:hidden; background:#e0e0e0;">
        <img src="{{ item.after_image }}" style="width:100%; height:240px; object-fit:cover;" alt="">
      </div>
    </div>

    <!-- 文字说明：左右并排 -->
    <div style="display:flex; gap:12px; margin-top:12px;">
      <!-- 升级前文字 -->
      <div style="flex:1; text-align:center;">
        <div style="font-size:26px; font-weight:800; color:#333;">
          <span style="border-bottom:3px solid #333; padding-bottom:2px;">{{ item.before_title }}</span>
        </div>
        <div style="font-size:20px; color:#666; margin-top:8px; line-height:1.4;">{{ item.before_desc }}</div>
      </div>
      <!-- 升级后文字 -->
      <div style="flex:1; text-align:center;">
        <div style="font-size:26px; font-weight:800; color:var(--theme-primary, #E8231A);">
          <span style="border-bottom:3px solid var(--theme-primary, #E8231A); padding-bottom:2px;">{{ item.after_title }}</span>
        </div>
        <div style="font-size:20px; color:#666; margin-top:8px; line-height:1.4;">{{ item.after_desc }}</div>
      </div>
    </div>

  </div>
  {% endfor %}

</div>{% endif %}
