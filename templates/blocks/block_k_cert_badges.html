<!--
  block_k_cert_badges — 资质证书/认证徽章
  宽度：750px

  变量：
  - section_title: 标题（如"资质认证 / 全国联保"）
  - section_subtitle: 副标题（可空）
  - badge_items: 徽章列表（4-10项），每项：{"img":"url","title":"SGS检测","desc":"关键指标通过检测"}
    img 可空则用文字占位
-->

{% if badge_items %}<div style="width:750px; box-sizing:border-box; font-family:'PingFang SC','Noto Sans SC','Microsoft YaHei','Helvetica Neue',sans-serif; background:#ffffff; color:#111827; padding:42px 40px 44px 40px;">
  <div style="display:flex; align-items:flex-end; justify-content:space-between; gap:16px;">
    <div style="min-width:0;">
      <div style="font-size:26px; font-weight:900; line-height:1.2;">{{ section_title }}</div>
      {% if section_subtitle %}
      <div style="margin-top:10px; font-size:13px; color:rgba(17,24,39,0.70); line-height:1.7;">{{ section_subtitle }}</div>
      {% endif %}
    </div>
    <div style="flex:0 0 auto; padding:8px 12px; border-radius:999px; background:var(--theme-primary-light, rgba(232,35,26,0.08)); border:1px solid var(--theme-primary-border, rgba(232,35,26,0.25)); color:var(--theme-primary-dark, #B91C1C); font-size:12px; font-weight:800;">信任背书</div>
  </div>

  <div style="margin-top:18px; height:1px; background:linear-gradient(90deg, rgba(17,24,39,0) 0%, rgba(17,24,39,0.12) 35%, rgba(232,35,26,0.28) 70%, rgba(17,24,39,0) 100%);"></div>

  <div style="margin-top:18px; display:flex; flex-wrap:wrap; gap:12px;">
    {% for b in badge_items %}
    <div style="width:calc(50% - 6px); box-sizing:border-box; border-radius:16px; border:1px solid rgba(17,24,39,0.10); background:#F9FAFB; padding:14px 14px 12px 14px;">
      <div style="display:flex; align-items:flex-start; gap:12px;">
        {% if b.img %}
        <div style="flex:0 0 56px; width:56px; height:56px; border-radius:14px; background:#ffffff; border:1px solid rgba(17,24,39,0.10); display:flex; align-items:center; justify-content:center; overflow:hidden;">
          <img src="{{ b.img }}" alt="{{ b.title }}" style="width:56px; height:56px; object-fit:contain; display:block;" />
        </div>
        {% else %}
        <div style="flex:0 0 56px; width:56px; height:56px; border-radius:14px; background:var(--theme-primary-light, rgba(232,35,26,0.10)); border:1px solid var(--theme-primary-border, rgba(232,35,26,0.25)); display:flex; align-items:center; justify-content:center; font-size:12px; font-weight:900; color:var(--theme-primary-dark, #B91C1C); text-align:center; line-height:1.2; padding:6px;">{{ b.title }}</div>
        {% endif %}
        <div style="flex:1; min-width:0;">
          <div style="font-size:14px; font-weight:900; line-height:1.3;">{{ b.title }}</div>
          {% if b.desc %}
          <div style="margin-top:6px; font-size:12px; line-height:1.7; color:rgba(17,24,39,0.70);">{{ b.desc }}</div>
          {% endif %}
        </div>
      </div>
    </div>
    {% endfor %}
  </div>
</div>{% endif %}
