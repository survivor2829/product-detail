<!--
  block_m_steps — 使用流程/操作步骤
  宽度：750px

  变量：
  - section_title: 标题（如"使用流程"）
  - steps: 列表（4-6步），每项：{"title":"加注清水", "desc":"按指引加入清水与清洁剂"}
-->

{% if steps %}<div style="width:750px; box-sizing:border-box; font-family:'PingFang SC','Noto Sans SC','Microsoft YaHei','Helvetica Neue',sans-serif; background:var(--theme-bg-dark, #0E1220); color:#fff; padding:44px 40px 46px 40px;">
  <div style="font-size:28px; font-weight:900; line-height:1.2;">{{ section_title }}</div>

  <div style="margin-top:18px; display:flex; flex-wrap:wrap; gap:12px;">
    {% for s in steps %}
    <div style="width:calc(50% - 6px); border-radius:18px; background:rgba(255,255,255,0.06); border:1px solid rgba(255,255,255,0.12); padding:16px 16px 14px 16px; box-sizing:border-box;">
      <div style="display:flex; gap:12px; align-items:flex-start;">
        <div style="flex:0 0 34px; width:34px; height:34px; border-radius:12px; background:var(--theme-primary, #E8231A); display:flex; align-items:center; justify-content:center; font-size:13px; font-weight:950;">{{ '%02d'|format(loop.index) }}</div>
        <div style="flex:1; min-width:0;">
          <div style="font-size:15px; font-weight:950; line-height:1.35;">{{ s.title }}</div>
          <div style="margin-top:8px; font-size:13px; line-height:1.65; color:rgba(255,255,255,0.78);">{{ s.desc }}</div>
        </div>
      </div>
    </div>
    {% endfor %}
  </div>
</div>{% endif %}
