<!--
  block_h_scene_grid — 适用场景/行业适配（场景卡片网格）
  宽度：750px

  变量：
  - section_title: 标题（如"适用场景"）
  - section_subtitle: 副标题（可空）
  - scenes: 场景列表（4-8项），每项：{"name":"医院", "desc":"低噪音，减少打扰", "image":"/path.jpg"}
-->

{% if scenes %}<div style="width:750px; box-sizing:border-box; font-family:'PingFang SC','Noto Sans SC','Microsoft YaHei','Helvetica Neue',sans-serif; background:var(--theme-bg-dark, #0B0F1A); color:#fff; padding:44px 36px 48px; position:relative; overflow:hidden;">

  <!-- 装饰：右上角光斑 -->
  <div style="position:absolute; top:-50px; right:-30px; width:220px; height:220px; background:radial-gradient(circle, rgba(232,35,26,0.08) 0%, transparent 70%); pointer-events:none;"></div>

  <div style="display:flex; align-items:flex-end; justify-content:space-between; gap:12px; position:relative; z-index:1;">
    <div style="min-width:0;">
      <div style="font-size:28px; font-weight:900; line-height:1.2; letter-spacing:1px;">{{ section_title }}</div>
      {% if section_subtitle %}<div style="margin-top:10px; font-size:14px; color:rgba(255,255,255,0.65); line-height:1.65;">{{ section_subtitle }}</div>{% endif %}
    </div>
    <div style="flex:0 0 auto; width:92px; height:5px; border-radius:999px; background:linear-gradient(90deg, var(--theme-primary, #E8231A) 0%, rgba(232,35,26,0.05) 100%);"></div>
  </div>

  <div style="margin-top:20px; display:flex; flex-wrap:wrap; gap:12px; position:relative; z-index:1;">
    {% for s in scenes %}
    <div style="width:calc(50% - 6px); border-radius:16px; overflow:hidden; border:1px solid rgba(255,255,255,0.1); background:rgba(255,255,255,0.04);">
      <div style="height:165px; background:#111827; position:relative; overflow:hidden;">
        {% if s.image %}
        <img src="{{ s.image }}" alt="{{ s.name }}" style="width:100%; height:100%; object-fit:cover; display:block;" />
        <!-- 图片底部渐变 -->
        <div style="position:absolute; bottom:0; left:0; right:0; height:60px; background:linear-gradient(180deg, transparent, rgba(0,0,0,0.4)); pointer-events:none;"></div>
        {% else %}
        <div style="width:100%; height:100%; background:linear-gradient(135deg,#1a1f35 0%,#252a3e 100%); display:flex; align-items:center; justify-content:center; font-size:42px; color:rgba(255,255,255,0.15);">{{ s.name[:1] }}</div>
        {% endif %}
        <!-- 场景名标签 -->
        <div style="position:absolute; left:12px; top:12px; padding:6px 12px; border-radius:999px; background:rgba(0,0,0,0.5); backdrop-filter:blur(6px); -webkit-backdrop-filter:blur(6px); border:1px solid rgba(255,255,255,0.15); font-size:13px; font-weight:700; letter-spacing:0.5px;">{{ s.name }}</div>
      </div>
      <div style="padding:12px 14px 14px;">
        <div style="font-size:13px; color:rgba(255,255,255,0.75); line-height:1.65;">{{ s.desc }}</div>
      </div>
    </div>
    {% endfor %}
  </div>
</div>{% endif %}
