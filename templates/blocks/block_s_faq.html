{#
  FAQ 常见问题屏
  变量:
  - section_title: 标题（默认"常见问题"）
  - section_subtitle: 副标题
  - faqs: [{question, answer}, ...]
#}
<div style="width:750px; font-family:'PingFang SC','Noto Sans SC','Microsoft YaHei','Helvetica Neue',sans-serif; background:#fff; padding:50px 40px;">

  <div style="text-align:center; margin-bottom:36px;">
    <div style="font-size:28px; font-weight:800; color:#1a1a1a; letter-spacing:1px;">{{ section_title|default('常见问题') }}</div>
    {% if section_subtitle %}
    <div style="font-size:14px; color:#999; margin-top:8px;">{{ section_subtitle }}</div>
    {% endif %}
  </div>

  {% for item in faqs|default([]) %}
  <div style="border:1px solid #f0f0f0; border-radius:12px; padding:20px 24px; margin-bottom:12px; background:#fafafa;">
    <div style="display:flex; align-items:flex-start; gap:12px;">
      <span style="flex-shrink:0; width:28px; height:28px; background:linear-gradient(135deg,#E8231A,#ff5e57); color:#fff; border-radius:50%; font-size:13px; font-weight:700; display:flex; align-items:center; justify-content:center;">Q</span>
      <div style="font-size:15px; font-weight:700; color:#1a1a1a; line-height:1.6; padding-top:3px;">{{ item.question }}</div>
    </div>
    <div style="display:flex; align-items:flex-start; gap:12px; margin-top:12px;">
      <span style="flex-shrink:0; width:28px; height:28px; background:#f0f0f0; color:#666; border-radius:50%; font-size:13px; font-weight:700; display:flex; align-items:center; justify-content:center;">A</span>
      <div style="font-size:14px; color:#555; line-height:1.8; padding-top:3px;">{{ item.answer }}</div>
    </div>
  </div>
  {% endfor %}

</div>
