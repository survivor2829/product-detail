{# 主图模板1：纯白底产品图 — 800x800 电商主图 #}
<div class="main-img-canvas" style="width:800px;height:800px;position:relative;overflow:hidden;background:#FFFFFF;font-family:'PingFang SC','Microsoft YaHei',sans-serif;">
  <!-- 产品居中 -->
  <div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;padding:60px;">
    <img src="{{ product_image }}" alt="" style="max-width:100%;max-height:100%;object-fit:contain;filter:drop-shadow(0 8px 24px rgba(0,0,0,0.10));">
  </div>
  <!-- 品牌角标 -->
  {% if logo_image %}
  <div style="position:absolute;top:32px;left:32px;">
    <img src="{{ logo_image }}" alt="" style="height:36px;object-fit:contain;opacity:0.85;">
  </div>
  {% endif %}
  <!-- 型号标注 -->
  {% if model_name %}
  <div style="position:absolute;bottom:36px;left:0;right:0;text-align:center;">
    <span style="font-size:22px;font-weight:600;color:#333;letter-spacing:1px;">{{ model_name }}</span>
  </div>
  {% endif %}
</div>
