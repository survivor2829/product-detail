{# 主图模板2：渐变背景 + 标语 — 800x800 电商主图 #}
<div class="main-img-canvas" style="width:800px;height:800px;position:relative;overflow:hidden;background:var(--theme-gradient-hero, linear-gradient(180deg,#E8231A 0%,#C91A12 100%));font-family:'PingFang SC','Microsoft YaHei',sans-serif;">
  <!-- 标语区 -->
  <div style="position:absolute;top:48px;left:48px;right:48px;z-index:2;">
    {% if logo_image %}
    <img src="{{ logo_image }}" alt="" style="height:32px;object-fit:contain;margin-bottom:16px;filter:brightness(0) invert(1);opacity:0.9;">
    {% endif %}
    <div style="font-size:34px;font-weight:800;color:var(--theme-text-on-primary,#fff);line-height:1.3;text-shadow:0 2px 8px rgba(0,0,0,0.15);">{{ slogan|default('') }}</div>
    {% if sub_slogan %}
    <div style="font-size:18px;color:var(--theme-text-on-primary,#fff);opacity:0.85;margin-top:10px;font-weight:500;">{{ sub_slogan }}</div>
    {% endif %}
  </div>
  <!-- 产品图 -->
  <div style="position:absolute;bottom:0;left:50%;transform:translateX(-50%);width:85%;text-align:center;">
    <img src="{{ product_image }}" alt="" style="max-width:100%;max-height:520px;object-fit:contain;filter:drop-shadow(0 12px 32px rgba(0,0,0,0.25));">
  </div>
</div>
