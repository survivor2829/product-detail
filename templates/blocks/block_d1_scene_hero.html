<!--
  Block D1 — 场景大图+文字叠加屏（scene_hero）
  用途：场景背景铺满 + 产品人物图 + 大标题 + 标签
  宽度：750px
  
  需要传入的变量：
  - bg_image: 场景背景图路径
  - product_image: 产品+人物图路径（可选，留空则不显示）
  - title_line1_pre: 标题第一行前半（如"3600m²/h"）
  - title_line1_red: 标题第一行红色部分（如"清洁效率"，可选留空）
  - title_line1_end: 标题第一行结尾（可选留空）
  - title_line2: 标题第二行（如"适用万平场所清洁。"）
  - badge_text: 右侧标签文字（如"Plus升级版"，可选留空则不显示）
-->
<div style="width:750px; font-family:'PingFang SC','Microsoft YaHei','Helvetica Neue',sans-serif; overflow:hidden;">
  
  <div style="width:750px; height:1000px; position:relative; overflow:hidden; background:#c8c8c8;">
    
    <!-- 场景背景图 -->
    <img src="{{ bg_image }}" style="width:100%; height:100%; object-fit:cover; position:absolute; top:0; left:0;" alt="">
    
    <!-- 顶部半透明遮罩让文字更清晰 -->
    <div style="position:absolute; top:0; left:0; right:0; height:220px; background:linear-gradient(180deg, rgba(0,0,0,0.35) 0%, rgba(0,0,0,0) 100%); z-index:1;"></div>
    
    <!-- 大标题：左上角 -->
    <div style="position:absolute; top:40px; left:36px; z-index:2;">
      <div style="font-size:52px; font-weight:900; color:#fff; line-height:1.3; text-shadow:0 2px 10px rgba(0,0,0,0.3);">
        {{ title_line1_pre }}{% if title_line1_red %}<span style="color:#E8231A;">{{ title_line1_red }}</span>{% endif %}{{ title_line1_end|default('') }}
      </div>
      <div style="font-size:52px; font-weight:900; color:#fff; line-height:1.3; text-shadow:0 2px 10px rgba(0,0,0,0.3);">
        {{ title_line2 }}
      </div>
    </div>
    
    <!-- 标签（可选） -->
    {% if badge_text %}
    <div style="position:absolute; top:200px; right:36px; z-index:2; background:rgba(0,0,0,0.7); color:#fff; font-size:28px; font-weight:700; padding:12px 24px; border-radius:8px;">
      {{ badge_text }}
    </div>
    {% endif %}
    
    <!-- 产品+人物图（可选） -->
    {% if product_image %}
    <div style="position:absolute; bottom:20px; left:50%; transform:translateX(-50%); z-index:2; width:650px; height:600px; display:flex; align-items:flex-end; justify-content:center;">
      <img src="{{ product_image }}" style="max-width:100%; max-height:100%; object-fit:contain;" alt="">
    </div>
    {% endif %}
    
  </div>
  
</div>
