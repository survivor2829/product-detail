<!--
  block_p_compatibility — 适配型号清单（配件类专用）
  宽度：750px

  变量：
  - section_title: 标题（如"适配机型"）
  - section_subtitle: 副标题（可空）
  - compat_models: 适配型号列表，每项：{"model":"DZ50X", "series":"清洁机器人系列", "note":"可选"}
  - compat_note: 底部兼容性说明（可空）
-->

{% if compat_models %}<div style="width:750px; box-sizing:border-box; font-family:'PingFang SC','Noto Sans SC','Microsoft YaHei','Helvetica Neue',sans-serif; background:var(--theme-gradient-dark, linear-gradient(180deg, #0E1220 0%, #0B0F1A 100%)); color:#ffffff; padding:44px 40px 46px 40px;">
  <div style="display:flex; align-items:flex-end; justify-content:space-between; gap:16px;">
    <div style="min-width:0;">
      <div style="font-size:28px; font-weight:900; line-height:1.2;">{{ section_title }}</div>
      {% if section_subtitle %}
      <div style="margin-top:10px; font-size:14px; color:rgba(255,255,255,0.78); line-height:1.7;">{{ section_subtitle }}</div>
      {% endif %}
    </div>
    <div style="flex:0 0 auto; padding:8px 12px; border-radius:999px; background:var(--theme-primary-light, rgba(30,111,191,0.18)); border:1px solid var(--theme-primary-border, rgba(30,111,191,0.45)); color:var(--theme-accent, #7DB8F0); font-size:12px; font-weight:800;">适配查询</div>
  </div>

  <div style="margin-top:18px; height:1px; background:linear-gradient(90deg, rgba(255,255,255,0.0) 0%, var(--theme-primary-border, rgba(30,111,191,0.45)) 50%, rgba(255,255,255,0.0) 100%);"></div>

  <div style="margin-top:18px; display:flex; flex-wrap:wrap; gap:10px;">
    {% for m in compat_models %}
    <div style="width:calc(50% - 5px); box-sizing:border-box; border-radius:14px; padding:14px 16px; background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.12);">
      <div style="display:flex; align-items:center; gap:10px;">
        <div style="flex:0 0 auto; width:8px; height:8px; border-radius:50%; background:var(--theme-primary, #1E6FBF); box-shadow:0 0 0 3px var(--theme-primary-border, rgba(30,111,191,0.25));"></div>
        <div style="flex:1; min-width:0;">
          <div style="font-size:15px; font-weight:900; line-height:1.3;">{{ m.model }}</div>
          {% if m.series %}<div style="margin-top:4px; font-size:12px; color:rgba(255,255,255,0.65);">{{ m.series }}</div>{% endif %}
        </div>
      </div>
    </div>
    {% endfor %}
  </div>

  {% if compat_note %}
  <div style="margin-top:14px; font-size:12px; color:rgba(255,255,255,0.55); line-height:1.7;">{{ compat_note }}</div>
  {% endif %}
</div>{% endif %}
