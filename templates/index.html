<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>小玺AI · 详情页生成器</title>
<link rel="stylesheet" href="/static/css/design-system.css">
<style>
  body { background: var(--color-bg-page); }

  /* ── Topbar ── */
  .topbar {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    background: rgba(255,255,255,0.72);
    backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--color-border);
    padding: 0 32px; height: 52px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .topbar-brand {
    font-size: 15px; font-weight: 600; color: var(--color-text);
    display: flex; align-items: center; gap: 10px;
  }
  .topbar-brand .dot {
    width: 8px; height: 8px; background: var(--color-primary);
    border-radius: 50%; flex-shrink: 0;
  }
  .topbar-right { display: flex; align-items: center; gap: 6px; }
  .topbar-right span {
    font-size: 13px; color: var(--color-text-muted); padding: 6px 10px;
  }
  .topbar-right a,
  .topbar-right button {
    font-family: var(--font-sans);
    font-size: 13px; font-weight: 500;
    color: var(--color-text-muted);
    text-decoration: none;
    padding: 6px 12px;
    border-radius: var(--radius-md);
    transition: all var(--transition-fast);
    background: none; border: none; cursor: pointer;
  }
  .topbar-right a:hover,
  .topbar-right button:hover {
    color: var(--color-text);
    background: rgba(0,0,0,0.04);
  }
  .topbar-right .admin-link {
    color: var(--color-primary);
    background: var(--color-primary-light);
  }
  .topbar-right .admin-link:hover {
    background: rgba(20,110,245,0.15);
  }

  /* ── Hero ── */
  .hero {
    padding-top: 140px;
    padding-bottom: 20px;
    text-align: center;
  }
  .hero-badge {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 5px 14px;
    font-size: 12px; font-weight: 600; letter-spacing: 0.05em;
    color: var(--color-primary);
    background: var(--color-primary-light);
    border: 1px solid var(--color-primary-border);
    border-radius: var(--radius-full);
    margin-bottom: 20px;
    text-transform: uppercase;
  }
  .hero h1 {
    font-size: 36px; font-weight: 700;
    letter-spacing: -0.03em;
    color: var(--color-text);
    margin-bottom: 12px;
    line-height: 1.15;
  }
  .hero p {
    font-size: 16px;
    color: var(--color-text-muted);
    max-width: 420px;
    margin: 0 auto;
    line-height: 1.6;
  }

  /* ── Grid ── */
  .grid-wrap {
    max-width: 720px; width: 100%;
    margin: 0 auto; padding: 24px 24px 80px;
    display: grid; grid-template-columns: 1fr 1fr; gap: 16px;
  }

  .category-card {
    background: var(--color-bg);
    border: 1px solid var(--color-border);
    border-radius: var(--radius-lg);
    padding: 28px 24px;
    text-decoration: none;
    position: relative;
    overflow: hidden;
    transition: all var(--transition-base);
    box-shadow: var(--shadow-xs);
    display: flex; flex-direction: column; gap: 10px;
  }
  .category-card:hover {
    border-color: var(--color-border-hover);
    box-shadow: var(--shadow-card);
    transform: translateY(-3px);
  }
  .category-card .accent-bar {
    position: absolute; left: 0; top: 0;
    width: 3px; height: 100%; border-radius: 0 3px 3px 0;
  }
  .category-card .card-icon {
    font-size: 32px; line-height: 1;
  }
  .category-card .card-name {
    font-size: 18px; font-weight: 600;
    color: var(--color-text);
  }
  .category-card .card-desc {
    font-size: 13px; color: var(--color-text-muted);
    line-height: 1.6;
  }
  .category-card .card-arrow {
    position: absolute; right: 20px; top: 50%;
    transform: translateY(-50%);
    width: 20px; height: 20px;
    color: var(--color-text-muted);
    opacity: 0.4;
    transition: all var(--transition-base);
  }
  .category-card:hover .card-arrow {
    opacity: 0.8;
    transform: translateY(-50%) translateX(3px);
  }

  /* ── Footer ── */
  .footer {
    text-align: center; padding: 24px;
    font-size: 12px; color: var(--color-text-muted);
  }
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-brand">
    <span class="dot"></span>
    小玺AI
  </div>
  <div class="topbar-right">
    <a href="/batch/upload">批量生成</a>
    <span>{{ current_user.username }}</span>
    <a href="/settings">账号设置</a>
    {% if current_user.is_admin %}
      <a href="/admin/users" class="admin-link">管理后台</a>
    {% endif %}
    <form method="POST" action="/auth/logout" style="display:inline">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <button type="submit">退出</button>
    </form>
  </div>
</div>

<div class="hero animate-in">
  <div class="hero-badge">AI Powered</div>
  <h1>产品详情页生成器</h1>
  <p>选择产品类型，AI 自动识别参数并生成电商详情长图</p>
</div>

<div class="grid-wrap">
  {% for c in categories %}
  <a class="category-card animate-in" href="/build/{{ c.type }}" style="animation-delay:{{ loop.index * 80 }}ms">
    <div class="accent-bar" style="background:{{ c.color }};"></div>
    <div class="card-icon">{{ c.icon }}</div>
    <div class="card-name">{{ c.type }}</div>
    <div class="card-desc">{{ c.desc }}</div>
    <svg class="card-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="9 18 15 12 9 6"/>
    </svg>
  </a>
  {% endfor %}
</div>

</body>
</html>
