<svg xmlns="http://www.w3.org/2000/svg" width="120" height="160" viewBox="0 0 120 160">
  <defs>
    <linearGradient id="hero_classic-red" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8231A"/>
      <stop offset="100%" stop-color="#C91A12"/>
    </linearGradient>
    <clipPath id="clip_classic-red">
      <rect x="4" y="4" width="112" height="152" rx="8"/>
    </clipPath>
  </defs>
  <!-- Card outline -->
  <rect x="4" y="4" width="112" height="152" rx="8" fill="#F5F5F5" stroke="#E0E0E0" stroke-width="1"/>
  <g clip-path="url(#clip_classic-red)">
    <!-- Hero area -->
    <rect x="4" y="4" width="112" height="50" fill="url(#hero_classic-red)"/>
    <!-- Hero text lines -->
    <rect x="16" y="18" width="48" height="5" rx="2" fill="#FFFFFF" opacity="0.9"/>
    <rect x="16" y="28" width="36" height="4" rx="2" fill="#FFFFFF" opacity="0.5"/>
    <!-- Content area -->
    <rect x="4" y="54" width="112" height="62" fill="#FFFFFF"/>
    <!-- Content blocks -->
    <rect x="14" y="62" width="92" height="6" rx="2" fill="#D0D0D0"/>
    <rect x="14" y="74" width="40" height="28" rx="4" fill="#F5F5F5"/>
    <rect x="62" y="74" width="44" height="28" rx="4" fill="#F5F5F5"/>
    <!-- Accent dots -->
    <circle cx="26" cy="82" r="3" fill="#E8231A" opacity="0.7"/>
    <circle cx="74" cy="82" r="3" fill="#E8231A" opacity="0.7"/>
    <rect x="14" y="108" width="60" height="4" rx="2" fill="#D0D0D0"/>
    <!-- CTA area -->
    <rect x="4" y="116" width="112" height="40" fill="#1A1A1A"/>
    <!-- CTA button -->
    <rect x="24" y="128" width="72" height="16" rx="8" fill="#E8231A"/>
    <rect x="40" y="134" width="40" height="4" rx="2" fill="#FFFFFF" opacity="0.9"/>
  </g>
</svg>