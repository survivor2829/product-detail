[pytest]
# 默认 pytest collect 范围限定真测试目录, 避免 scripts/archive/legacy/ 下
# hand-run e2e 脚本 (命名 test_*.py 但顶层就 sys.exit / Playwright I/O)
# 在 import 阶段把 pytest 进程整个干掉 (历史踩坑: scripts/archive/legacy/
# test_ai_compose_advantages.py:30 顶层 sys.exit(1) → INTERNALERROR).
testpaths =
    ai_refine_v2/tests
    tests

# 防御性 norecursedirs: 即使 testpaths 漏了某条, 也不会爬到这些目录.
norecursedirs =
    .venv .git .claude .omc .probe .pytest_cache __pycache__
    scripts
    docs
    static
    output
    stage1_eval_output
    stage5_real_test
    stage6_real_test
    smoke_output_v2
    v2_result
    test_batch_input
    instance
    migrations

# subtests 插件 (项目用, 见 ai_refine_v2/tests/) 默认也跑
addopts = -ra
